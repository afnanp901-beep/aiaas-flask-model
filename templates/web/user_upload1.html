    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0px;
      background-color: #fdf2f2;
    }

    h2 {
      text-align: center;
      color: #b91c1c;
    }

    .table-container {
      max-width: 1000px;
      margin: auto;
      overflow-x: auto;
      background: #fffafa;
      box-shadow: 0 0 10px rgba(255,0,0,0.1);
      border-radius: 10px;
      padding: 20px;
      border: 1px solid #fecaca;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      border-bottom: 1px solid #fcdcdc;
    }

    th {
      background-color: #dc2626;
      color: white;
      font-weight: 600;
    }

    tr:nth-child(even) {
      background-color: #fff1f1;
    }

    tr:hover {
      background-color:#FFFFFF;
    }

    @media (max-width: 600px) {
      th, td {
        padding: 10px 8px;
      }
    }
  </style>
  
  <style>
       
        .profile-container {
            max-width: 600px;
            margin: auto;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .profile-img {
            display: block;
            margin: 15px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FF3300;
        }
        .info {
            margin: 20px 0;
        }
        .info p {
            margin: 10px 0;
            font-size: 16px;
            color: #555;
        }
        .status {
            font-weight: bold;
            color: #ff9800;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background:#FF3300;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
    </style>
 
</head>
