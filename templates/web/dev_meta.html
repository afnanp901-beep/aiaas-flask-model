								{% if msg=="success" %}

					<script>
					//Using setTimeout to execute a function after 5 seconds.

						<div class="container mt-5">
  <h2 class="mb-4 text-center">CrimeNet Model Meta Information</h2>
 
					
  <form action="" method="post" class="border p-4 shadow rounded bg-light">

    <div class="mb-3">
      <label for="model_id" class="form-label">Model ID</label>
      <input type="text" class="form-control" id="model_id" name="model_id" value="{{mdata[2]}}">
    </div>
	<div class="mb-3">
      <label for="model_owner_id" class="form-label">Model Owner ID</label>
      <input type="text" class="form-control" id="model_owner_id" name="model_owner_id" value="{{data[6]}}">
    </div>


    <div class="mb-3">
      <label for="model_name" class="form-label">Model Name</label>
      <input type="text" class="form-control" id="model_name" name="model_name" value="CrimeNet Face Recognition AI">
    </div>

    <div class="mb-3">
      <label for="model_version" class="form-label">Model Version</label>
      <input type="text" class="form-control" id="model_version" name="model_version" value="v1.0">
    </div>

    
    <div class="mb-3">
      <label for="model_description" class="form-label">Model Description</label>
      <textarea class="form-control" id="model_description" name="model_description" rows="3">Face recognition AI model for crime detection.</textarea>
    </div>

    <div class="mb-3">
      <label for="model_type" class="form-label">Model Type</label>
      <select class="form-control" id="model_type" name="model_type">
        <option selected>Classification</option>
        <option>Regression</option>
        <option>Clustering</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="input_type" class="form-label">Input Type</label>
      <input type="text" class="form-control" id="input_type" name="input_type" value="Encrypted Facial Features (FHE)">
    </div>

    <div class="mb-3">
      <label for="output_type" class="form-label">Output Type</label>
      <input type="text" class="form-control" id="output_type" name="output_type" value="Suspect Identity with Confidence Score">
    </div>

    <div class="mb-3">
      <label for="model_algorithm" class="form-label">Model Algorithm</label>
      <input type="text" class="form-control" id="model_algorithm" name="model_algorithm" value="Convolutional Neural Network (CNN)">
    </div>

    <div class="mb-3">
      <label for="training_dataset" class="form-label">Training Dataset Info</label>
      <textarea class="form-control" id="training_dataset" name="training_dataset" rows="2">50,000 labeled face images from crime database.</textarea>
    </div>

    <div class="mb-3">
      <label for="model_accuracy" class="form-label">Model Accuracy</label>
      <input type="text" class="form-control" id="model_accuracy" name="model_accuracy" value="{{acc}}%">
    </div>

    <div class="mb-3">
      <label for="evaluation_metrics" class="form-label">Evaluation Metrics</label>
      <input type="text" class="form-control" id="evaluation_metrics" name="evaluation_metrics" value="Accuracy, Precision, Recall, F1-Score">
    </div>

    <div class="mb-3">
      <label for="homomorphic_encryption" class="form-label">Homomorphic Encryption</label>
      <select id="homomorphic_encryption" class="form-control" name="homomorphic_encryption">
        <option selected>Yes</option>
        <option>No</option>
      </select>
    </div>

    <div class="mb-3">
      <label for="encryption_status" class="form-label">Encryption Status</label>
      <input type="text" class="form-control" id="encryption_status" name="encryption_status" value="Encrypted">
    </div>

    <div class="mb-3">
      <label for="deployment_date" class="form-label">Model Deployment Date</label>
      <input type="date" class="form-control" id="deployment_date" name="deployment_date" value="" required>
    </div>

    <!--<div class="mb-3">
      <label for="last_updated" class="form-label">Last Updated Date</label>

    </div>

    <div class="mb-3">
      <label for="usage_count" class="form-label">Usage Count</label>
      <input type="number" class="form-control" id="usage_count" name="usage_count" value="285">
    </div>-->

    <div class="mb-3">
      <label for="access_permissions" class="form-label">Access Permissions</label>
      <input type="text" class="form-control" id="access_permissions" name="access_permissions" value="Authorized Law Enforcement Agencies Only">
    </div>

    <div class="mb-3">
      <label for="license_type" class="form-label">License Type</label>
      <select id="license_type" class="form-control" name="license_type">
        <option selected>Proprietary</option>

    <div class="mb-3">

        <option>Non-Compliant</option>
      </select>
    </div>

    <div class="d-grid gap-2">
      <button type="submit" class="btn btn-primary">Submit Metadata</button>
    </div>
