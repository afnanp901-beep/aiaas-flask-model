<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glassy Login Form</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 300px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-container h2 {
      margin-bottom: 20px;
      color: #333;
    }

    .glass-container input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      outline: none;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
    }

    .glass-container button {
      width: 100%;
      padding: 10px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 15px;
      transition: background 0.3s;
    }

    .glass-container button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>

  <div class="glass-container">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>

</body>
</html>
